        {
          "@type": "Question",
          "name": "Is LegalCheck free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Basic legal analysis is completely free with no signup required. You get a verdict, the exact law cited, severity rating, and action steps at no cost. Premium reports with settlement valuations, demand letters, and negotiation playbooks start at $2.99."

          "name": "What countries does LegalCheck cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LegalCheck supports four major jurisdictions: United States (federal and state law), United Kingdom (England, Wales, Scotland), Canada (federal and provincial law), and the European Union (EU directives and regulations)."

        },
        {
          "@type": "Question",
          "name": "Is this real legal advice?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No — LegalCheck provides legal information, not legal advice. Our Premium reports deliver the same depth of analysis you'd get in a $500 attorney consultation: case strength scoring, win probability, settlement valuations, and demand letter drafts. Always consult a licensed attorney for advice specific to your situation."
          }
        },
        {
          "@type": "Question",

            "@type": "Answer",
            "text": "12 sections: Case Strength Score (1-100), Win Probability percentage, Similar Cases & Outcomes, Ready-to-Send Demand Letter Draft, Evidence Checklist with priority tags, 5-Step Negotiation Playbook, Risk Matrix (4 scenarios), Deadline Countdown with statute of limitations, Estimated Settlement Value (LOW/MID/HIGH), Lawyer Cost Estimator, Step-by-Step Legal Resolution plan, and Common Mistakes to Avoid."
          }

          "name": "How accurate is LegalCheck?",

          }
        }
      ]
    }
